            const momentsSection = !isNoMoments ? `
                <div class="mt-8 pt-6 border-t border-dashed border-gray-300 flex-1 flex flex-col">
                    <h4 class="font-serif text-xl md:text-2xl font-black italic text-[#8B2635] tracking-widest uppercase mb-4">Signature Moments</h4>
                    <div id="moments-${item.day}" class="grid grid-cols-2 gap-4 flex-1">
                        <label class="upload-label-${item.day} relative moment-col no-print aspect-square bg-white border-[3px] border-dashed border-gray-200 rounded-lg flex flex-col items-center justify-center cursor-pointer hover:bg-[#F9F7F1] transition-all overflow-hidden h-[200px] md:h-auto">
                            <input type="file" class="hidden-input live-upload-input" data-day="${item.day}" accept="image/*" multiple />
                            <i data-lucide="camera" class="w-10 h-10 text-gray-300 mb-4 pointer-events-none"></i>
                            <span class="text-[11px] font-sans font-black uppercase tracking-[0.3em] text-gray-400 pointer-events-none">添加照片</span>
                        </label>
                    </div>
                </div>
            ` : '';

            htmlContent += `
            <div class="page">
                <div class="page-content px-6 md:px-12 py-8 md:py-12 ${borderClass} border-gray-300">
                    <article class="h-full relative ${articleClass}">
                        <div class="absolute top-0 right-0 z-10 opacity-60 pointer-events-none no-print">
                            <img src="https://i.postimg.cc/t4zywrjF/Carl-s-logo-without-background.png" alt="Logo" class="h-16 md:h-20 w-auto" />
                        </div>
                        <div class="flex flex-col h-full">
                            <div class="flex items-end gap-6 mb-6">
                                <h2 class="text-6xl md:text-[6rem] font-cinzel font-bold tracking-tighter leading-none" style="color: ${item.color}">${dayNum}.</h2>
                                <div class="pb-2">
                                    <span class="block text-lg font-cormorant italic text-gray-400 mb-1">${item.date}</span>
                                    <h3 class="text-3xl md:text-4xl font-serif font-black tracking-tight leading-tight">${item.title}</h3>
                                </div>
                            </div>
                            <div class="flex flex-col md:flex-row gap-6 mb-6 items-stretch content-row">
                                <div class="flex-1 text-[18px] md:text-[22px] font-cormorant italic text-[#222] text-justify flex flex-col justify-center content-text">
                                    <p class="leading-[1.8] tracking-wide my-auto">
                                        <span class="font-sans font-black not-italic uppercase text-[12px] md:text-[14px] tracking-[0.3em] block mb-2" style="color: ${item.color}">${item.location.split('，')[0]} —</span>
                                        ${item.description}
                                    </p>
                                </div>
                                <div class="w-full md:w-[45%] shrink-0 relative photo-wrapper flex flex-col">
                                    <div class="photo-container bg-white p-2 border shadow-sm relative flex-1 flex flex-col">
                                        <img src="${item.headingPhoto}" class="w-full h-full object-cover block max-h-[160px] md:max-h-[200px]" alt="Cover" />
                                    </div>
                                    <div class="w-full text-right mt-2">
                                        <span class="font-sans text-[9px] md:text-[10px] font-black tracking-[0.3em] px-2 py-1 bg-[#1a1a1a] text-[#D4AF37] uppercase inline-flex items-center gap-2">
                                            <i data-lucide="map-pin" class="w-3 h-3"></i> ${item.location}
                                        </span>
                                    </div>
                                </div>
                            </div>
                            ${momentsSection}
                        </div>
                    </article>
                </div>
            </div>
            `;
        });
        
        // 封底
        htmlContent += `
            <div class="page" data-density="hard">
                <div class="page-content footer-page bg-[#153F2D] text-[#F9F7F1] flex flex-col justify-center items-center p-8 md:p-16 border-l border-[#0c261b]">
                    <i data-lucide="heart" class="mb-10 text-[#D4AF37] w-12 h-12"></i>
                    <h2 class="text-3xl md:text-4xl font-serif font-black uppercase mb-6 tracking-[0.4em] text-center">世界很美，感謝有您</h2>
                    <p class="font-cormorant italic text-2xl md:text-3xl mb-16 text-[#D4AF37] text-center">"Enjoy the World with Carl"</p>
                    <div class="flex justify-center items-center gap-6 md:gap-10 w-full">
                        <div class="flex-1 h-[1px] bg-white/20"></div>
                        <p class="text-[10px] md:text-[12px] font-sans font-black tracking-[0.5em] uppercase opacity-70">Carl Chan • 專屬回憶冊</p>
                        <div class="flex-1 h-[1px] bg-white/20"></div>
                    </div>
                </div>
            </div>
        `;

        container.innerHTML = htmlContent;
        lucide.createIcons();

        // --- 初始化 StPageFlip 翻頁引擎 ---
        let pageFlip;
        function initPageFlip() {
            pageFlip = new PageFlip(document.getElementById('booklet-root'), {
                width: 794, // 基準 A4 寬度
                height: 1123, // 基準 A4 高度
                size: "fit", // 自動適應螢幕大小，保持比例
                minWidth: 315,
                maxWidth: 1000,
                minHeight: 420,
                maxHeight: 1414,
                maxShadowOpacity: 0.2, // 逼真的書本中縫陰影
                showCover: true,
                mobileScrollSupport: true,
                usePortrait: true // 在手機上自動變為單頁顯示
            });
            pageFlip.loadFromHTML(document.querySelectorAll('.page'));

            // 綁定導航按鈕
            document.getElementById('btn-prev').addEventListener('click', () => pageFlip.flipPrev());
            document.getElementById('btn-next').addEventListener('click', () => pageFlip.flipNext());
            
            // 翻頁時的按鈕狀態處理
            pageFlip.on('flip', (e) => {
                document.getElementById('btn-prev').style.opacity = e.data === 0 ? '0.5' : '1';
                document.getElementById('btn-next').style.opacity = e.data === pageFlip.getPageCount() - 1 ? '0.5' : '1';
            });
        }
        
        // 確保 DOM 載入且圖片高度計算完成後再初始化，避免排版跑位
        setTimeout(initPageFlip, 500);

        // --- Firebase 與 同步邏輯 ---
        let appInstance, authInstance, dbInstance;
        let userInstance = null;
        let remoteData = {};

        const statusEl = document.createElement('div');
        statusEl.className = 'no-print';
        statusEl.style.cssText = 'position:fixed;top:15px;left:15px;z-index:9999;background:white;padding:10px 20px;border-radius:30px;font-size:12px;font-family:sans-serif;box-shadow:0 4px 20px rgba(0,0,0,0.15);display:flex;align-items:center;gap:12px;font-weight:bold;transition:all 0.5s ease-in-out; opacity:0; pointer-events:none;';
        statusEl.innerHTML = '<div id="status-dot" style="width:10px;height:10px;border-radius:50%;background:#ccc;"></div><span id="status-text">初始化雲端...</span>';
        document.body.appendChild(statusEl);

        function setSyncStatus(status) {
            const dot = document.getElementById('status-dot');
            const txt = document.getElementById('status-text');
            if (status.startsWith('error') || status === 'local') {
                statusEl.style.opacity = '1'; statusEl.style.pointerEvents = 'auto';
            } else {
                statusEl.style.opacity = '0'; statusEl.style.pointerEvents = 'none';
            }
            if (status === 'syncing') { dot.style.background = '#3b82f6'; txt.innerText = '同步中...'; }
            else if (status === 'saved') { dot.style.background = '#10b981'; txt.innerText = '已儲存到雲端'; setTimeout(()=>setSyncStatus('idle'), 3000); }
            else if (status === 'idle') { dot.style.background = '#10b981'; txt.innerText = '雲端已連線'; }
            else if (status === 'error_auth_disabled') { dot.style.background = '#ef4444'; txt.innerText = '錯誤：請啟用匿名登入'; }
            else if (status === 'error_firestore_disabled') { dot.style.background = '#ef4444'; txt.innerText = '錯誤：Firestore 未建立或權限遭拒'; }
            else if (status === 'error') { dot.style.background = '#ef4444'; txt.innerText = '同步失敗'; }
            else if (status === 'local') { dot.style.background = '#f59e0b'; txt.innerText = '本地模式'; }
        }

        try {
            appInstance = initializeApp(firebaseConfig);
            authInstance = getAuth(appInstance);
            dbInstance = getFirestore(appInstance);
            onAuthStateChanged(authInstance, async (u) => {
                if (!u) {
                    try { await signInAnonymously(authInstance); } 
                    catch(e) { setSyncStatus('error'); }
                } else {
                    userInstance = u;
                    setSyncStatus('idle');
                    initSync();
                }
            });
        } catch(e) { setSyncStatus('local'); }

        function initSync() {
            if (!dbInstance) return;
            const daysCollection = collection(dbInstance, 'artifacts', appId, 'public', 'data', 'days');
            onSnapshot(daysCollection, (snapshot) => {
                snapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    const dayStr = docSnap.id.replace('day_', '');
                    remoteData[dayStr] = data;
                    updateDOM(dayStr, data);
                });
            }, (err) => { setSyncStatus('error'); });
        }

        function updateDOM(day, data) {
            const container = document.getElementById('moments-' + day);
            if (!container) return;
            
            const items = container.querySelectorAll('.moment-item');
            items.forEach(el => el.remove());

            const photos = data.userPhotos || [];
            const caps = data.captions || {};

            photos.forEach((base64, i) => {
                const div = document.createElement('div');
                div.className = 'moment-item moment-col flex flex-col gap-2 h-full';
                div.innerHTML = `
                    <div class="photo-container bg-white p-1.5 md:p-2 border shadow-sm relative group flex-1">
                        <img src="${base64}" class="w-full h-full object-cover max-h-[150px] md:max-h-[220px]" />
                        <button class="remove-photo-btn no-print print:hidden" data-day="${day}" data-idx="${i}">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" style="pointer-events:none;"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                        </button>
                    </div>
                    <div class="pl-3 border-l-[2px] border-[#8B2635]/30">
                        <textarea class="live-caption-box w-full bg-transparent border-none p-0 text-[12px] md:text-[14px] italic leading-relaxed text-gray-800 font-serif outline-none resize-none h-[28px] md:h-[40px]" data-day="${day}" data-idx="${i}" placeholder="在此填寫回憶...">${caps[i] || ""}</textarea>
                    </div>
                `;
                const label = container.querySelector('.upload-label-' + day);
                if (label) container.insertBefore(div, label);
            });

            const uploadLabel = container.querySelector('.upload-label-' + day);
            if (uploadLabel) uploadLabel.style.display = photos.length >= 4 ? 'none' : 'flex';
        }

        async function compressImage(file, maxWidth = 700) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        if (width > maxWidth) { height = Math.round((height * maxWidth) / width); width = maxWidth; }
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.5)); 
                    };
                };
            });
        }

        // 避免拖曳翻頁時觸發上傳框的點擊
        document.addEventListener('pointerdown', (e) => {
            if (e.target.closest('.live-caption-box') || e.target.closest('.live-upload-input') || e.target.closest('.remove-photo-btn')) {
                e.stopPropagation();
            }
        });

        document.addEventListener('change', async (e) => {
            if (e.target.classList.contains('live-upload-input')) {
                const day = e.target.dataset.day;
                const files = Array.from(e.target.files);
                if (!files.length || !userInstance || !dbInstance) return;
                
                setSyncStatus('syncing');
                const dayData = remoteData[day] || {};
                const newPhotos = [...(dayData.userPhotos || [])];

                for (const file of files) {
                    if (newPhotos.length >= 4) break;
                    newPhotos.push(await compressImage(file));
                }

                try {
                    await setDoc(doc(dbInstance, 'artifacts', appId, 'public', 'data', 'days', 'day_' + day), { userPhotos: newPhotos }, { merge: true });
                    setSyncStatus('saved');
                } catch(err) { setSyncStatus('error'); }
                e.target.value = '';
            }
        });

        document.addEventListener('click', async (e) => {
            const removeBtn = e.target.closest('.remove-photo-btn');
            if (removeBtn && userInstance && dbInstance) {
                setSyncStatus('syncing');
                const day = removeBtn.dataset.day;
                const idx = parseInt(removeBtn.dataset.idx);
                const dayData = remoteData[day] || {};
                const existingPhotos = dayData.userPhotos || [];
                const existingCaptions = dayData.captions || {};
                
                const newPhotos = existingPhotos.filter((_, i) => i !== idx);
                const updatedCaptions = {};
                newPhotos.forEach((_, i) => {
                    const oldIdx = i >= idx ? i + 1 : i;
                    if (existingCaptions[oldIdx]) updatedCaptions[i] = existingCaptions[oldIdx];
                });

                try {
                    await setDoc(doc(dbInstance, 'artifacts', appId, 'public', 'data', 'days', 'day_' + day), { userPhotos: newPhotos, captions: updatedCaptions }, { merge: true });
                    setSyncStatus('saved');
                } catch(err) { setSyncStatus('error'); }
            }
        });

        document.addEventListener('blur', async (e) => {
            if (e.target.classList.contains('live-caption-box') && userInstance && dbInstance) {
                setSyncStatus('syncing');
                const day = e.target.dataset.day;
                const idx = parseInt(e.target.dataset.idx);
                const currentCaptions = { ...((remoteData[day] || {}).captions || {}), [idx]: e.target.value };
                
                try {
                    await setDoc(doc(dbInstance, 'artifacts', appId, 'public', 'data', 'days', 'day_' + day), { captions: currentCaptions }, { merge: true });
                    setSyncStatus('saved');
                } catch(err) { setSyncStatus('error'); }
            }
        }, true);

        // --- 列印控制 ---
        const hideElementsForPrint = () => document.body.classList.add('is-printing');
        const restoreElementsAfterPrint = () => document.body.classList.remove('is-printing');

        window.addEventListener('beforeprint', hideElementsForPrint);
        window.addEventListener('afterprint', restoreElementsAfterPrint);

        if (window.matchMedia) {
            window.matchMedia('print').addListener(mql => mql.matches ? hideElementsForPrint() : restoreElementsAfterPrint());
        }
        
        document.getElementById('mobile-print-btn')?.addEventListener('click', () => {
            hideElementsForPrint();
            setTimeout(() => {
                window.print();
                setTimeout(() => restoreElementsAfterPrint(), 2000);
            }, 100);
        });

    </script>
</body>
</html>
